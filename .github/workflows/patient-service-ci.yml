
name: Patient Service CI Build and Publish Pipeline

on:
  push:
    branches: ["develop", "main"]
    paths:
      - "services/patient-service/**"
      - ".github/workflows/patient-service-ci.yml"

  pull_request:
    branches: ["develop", "main"]
    paths:
      - "services/patient-service/**"
      - ".github/workflows/patient-service-ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/patient-service/requirements.txt
          pip install -r services/patient-service/requirements-dev.txt

      - name: Run Ruff lint checks
        run: ruff check services/patient-service/

      - name: Check formatting
        run: ruff format services/patient-service/ --check

  security-scan:
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies for Snyk
        run: |
          python -m pip install --upgrade pip
          pip install -r services/patient-service/requirements.txt
          pip install -r services/patient-service/requirements-dev.txt

      - name: Set up Node.js for Snyk CLI
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk dependency scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --file=services/patient-service/requirements.txt \
            --package-manager=pip \
            --severity-threshold=high

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/patient-service/requirements.txt
          pip install -r services/patient-service/requirements-dev.txt

      - name: Run tests
        env:
          PATIENT_SERVICE_API_KEY: test-patient-service-key
          ENVIRONMENT: dev
          LOG_LEVEL: INFO
          ENABLE_SEED_DATA: "false"
          DEFAULT_PAGE_SIZE: "20"
          MAX_PAGE_SIZE: "100"
          RATE_LIMIT_PER_MINUTE: "100"
          PYTHONPATH: services/patient-service
        run: python -m pytest services/patient-service/tests -q

  build:
    needs: [test, security-scan]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/githostan/healthcare-platform/patient-service
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=patient-service
            org.opencontainers.image.description=Patient service API for healthcare-platform
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./services/patient-service
          file: ./services/patient-service/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}








# # =========================================================
# # CI Build and Publish Pipeline
# # =========================================================
# # Purpose:
# # - Run linting and tests for application changes
# # - Validate Kubernetes manifests for k8s-only changes
# # - Build and optionally publish Docker images to GHCR
# #
# # Why this workflow exists:
# # - Prevent unnecessary image builds when only k8s manifests change
# # - Keep app validation (lint/test/build) separate from k8s validation
# # - Ensure Docker images are only built when app-related files change
# #
# # Trigger behavior:
# # - Runs on pushes to develop and main
# # - Runs on pull requests targeting develop and main
# # =========================================================

