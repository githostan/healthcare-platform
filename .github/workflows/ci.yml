
name: CI Test

on:
  push:
    branches: ["feature/ci-test"]
#   pull_request:
#     branches: ["feature/ci-test"]

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run Ruff
        run: ruff check . --fix

      - name: Check formatting
        run: ruff format .
        # run: ruff format . --check
        # continue-on-error: true


  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install httpx

      - name: Run tests
        env:
          APPOINTMENT_API_KEY: ${{ secrets.APPOINTMENT_API_KEY }}
          PYTHONPATH: .
        run: pytest -q

  build: 
    needs: test
    runs-on: ubuntu-latest

    permissions: 
      contents: read
    #   packages: write    

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

    #   -  name: Login to GitHub Container Registry
    #     uses: docker/login-action@v3
    #     with:
    #       registry: ghcr.io
    #       username: ${{ github.actor }}
    #       password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: appointment-service:test
            # ghcr.io/githostan/appointment-service:dev
            # ghcr.io/githostan/appointment-service:${{ github.sha }}
      